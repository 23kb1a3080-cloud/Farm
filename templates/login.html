{% extends 'base.html' %}
{% block content %}

<div class="max-w-md mx-auto bg-white dark:bg-slate-900 border border-gray-150/60 dark:border-slate-800 p-8 rounded-[2rem] shadow-sm mt-12 space-y-6">
    <div class="text-center space-y-1">
        <h2 class="font-outfit font-extrabold text-2xl tracking-tight text-gray-800 dark:text-white">Account Login</h2>
        <p class="text-xs text-gray-400">Discover fresh yields and review order status metrics</p>
    </div>

    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-2xs font-bold text-gray-400 uppercase tracking-wider mb-1.5">Email Address</label>
            <input type="email" name="email" required class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-950 border border-gray-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-xs dark:text-white" placeholder="you@example.com">
        </div>
        <div>
            <label class="block text-2xs font-bold text-gray-400 uppercase tracking-wider mb-1.5">Password</label>
            <input type="password" name="password" required class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-950 border border-gray-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-xs dark:text-white" placeholder="••••••••">
        </div>

        <button type="submit" class="w-full py-3.5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl text-xs transition-all shadow-xs">
            Log In to AgriConnect
        </button>
    </form>

    <div class="text-center pt-4 border-t border-gray-100 dark:border-slate-800">
        <p class="text-xs text-gray-400">New to the platform? <a href="{{ url_for('register_view') }}" class="font-semibold text-emerald-600 hover:underline">Create Account</a></p>
    </div>
</div>

{% endblock %}
