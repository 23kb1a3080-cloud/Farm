{% extends 'base.html' %}
{% block content %}

<div class="max-w-md mx-auto bg-white dark:bg-slate-900 border border-gray-150/60 dark:border-slate-800 p-8 rounded-[2rem] shadow-sm mt-8 space-y-6">
    <div class="text-center space-y-1">
        <h2 class="font-outfit font-extrabold text-2xl tracking-tight text-gray-800 dark:text-white">Create Account</h2>
        <p class="text-xs text-gray-400">Join our clean direct agricultural system today</p>
    </div>

    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-2xs font-bold text-gray-400 uppercase tracking-wider mb-1.5">Full Name</label>
            <input type="text" name="name" required class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-950 border border-gray-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-xs dark:text-white" placeholder="John Doe">
        </div>
        <div>
            <label class="block text-2xs font-bold text-gray-400 uppercase tracking-wider mb-1.5">Email Address</label>
            <input type="email" name="email" required class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-950 border border-gray-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-xs dark:text-white" placeholder="john@example.com">
        </div>
        <div>
            <label class="block text-2xs font-bold text-gray-400 uppercase tracking-wider mb-1.5">Password</label>
            <input type="password" name="password" required class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-950 border border-gray-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-xs dark:text-white" placeholder="••••••••">
        </div>
        <div>
            <label class="block text-2xs font-bold text-gray-400 uppercase tracking-wider mb-1.5">Contact Phone</label>
            <input type="tel" name="phone" required class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-950 border border-gray-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-xs dark:text-white" placeholder="9876543210">
        </div>
        <div>
            <label class="block text-2xs font-bold text-gray-400 uppercase tracking-wider mb-1.5">Default Shipping Address</label>
            <input type="text" name="address" required class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-950 border border-gray-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-xs dark:text-white" placeholder="Suite #, Road, City, State">
        </div>
        <div>
            <label class="block text-2xs font-bold text-gray-400 uppercase tracking-wider mb-1.5">I Want To Register As</label>
            <select name="role" id="role-select" class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-950 border border-gray-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-xs dark:text-white">
                <option value="consumer">🛒 Consumer (Buyer)</option>
                <option value="farmer">👨‍🌾 Farmer (Seller)</option>
            </select>
        </div>

        <!-- Farmer specific metadata inputs -->
        <div id="farmer-fields" class="hidden p-4 bg-emerald-50/30 border border-emerald-100 rounded-2xl space-y-4">
            <h4 class="text-2xs font-bold text-emerald-800 uppercase tracking-wider">🌾 Farm Profile Settings</h4>
            <div>
                <label class="block text-2xs font-bold text-emerald-700 uppercase tracking-wider mb-1.5">Farm Name</label>
                <input type="text" name="farmName" class="w-full px-4 py-3 bg-white dark:bg-slate-950 border border-gray-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-xs dark:text-white" placeholder="Sunny Meadow Farm">
            </div>
            <div>
                <label class="block text-2xs font-bold text-emerald-700 uppercase tracking-wider mb-1.5">Farm Description</label>
                <textarea name="farmDescription" rows="2" class="w-full px-4 py-3 bg-white dark:bg-slate-950 border border-gray-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-xs dark:text-white resize-none" placeholder="Tell buyers about your farm and the produce you sell directly..."></textarea>
            </div>
        </div>

        <button type="submit" class="w-full py-3.5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl text-xs transition-all shadow-xs">
            Create Free Account
        </button>
    </form>

    <div class="text-center pt-4 border-t border-gray-100 dark:border-slate-800">
        <p class="text-xs text-gray-400">Already registered? <a href="{{ url_for('login_view') }}" class="font-semibold text-emerald-600 hover:underline">Log In</a></p>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    const roleSelect = document.getElementById('role-select');
    const farmerFields = document.getElementById('farmer-fields');
    
    roleSelect.addEventListener('change', () => {
        if(roleSelect.value === 'farmer') {
            farmerFields.classList.remove('hidden');
        } else {
            farmerFields.classList.add('hidden');
        }
    });
</script>
{% endblock %}
